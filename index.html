<!DOCTYPE html>
<html lang="et">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Resonant Art Gallery</title>

	<link rel="preconnect" href="https://api.artic.edu/" crossorigin />
	<link rel="preconnect" href="https://www.artic.edu/" crossorigin />
	<link rel="preconnect" href="https://collectionapi.metmuseum.org/" crossorigin />
	<link rel="preconnect" href="https://images.metmuseum.org/" crossorigin />
	<link rel="dns-prefetch" href="https://images.metmuseum.org/" />
	<link rel="preconnect" href="https://fonts.googleapis.com/" crossorigin />
	<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Foldit:wght@400&display=swap" rel="stylesheet" />

	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			font-family: "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
			overflow-x: hidden;
			margin: 0;
			background: black;
			color: #333;
		}

		#animation-page {
			position: fixed;
			inset: 0;
			z-index: 1000;
			background: black;
			transition: opacity 1s ease;
		}

		#animation-page.fade-out {
			opacity: 0;
			pointer-events: none;
		}

		#canvas1 {
			position: absolute;
			inset: 0;
		}

		#gallery-page {
			display: none;
			background-color: #f5f5f5;
			min-height: 100vh;
			padding: 20px;
		}

		h1 {
			font-family: "Foldit", sans-serif;
			font-weight: 400;
			color: #333;
			margin-bottom: 1.5rem;
			font-size: clamp(2.4rem, 7vw, 3.5rem);
			text-align: center;
		}

		.button-container {
			display: flex;
			flex-wrap: wrap;
			gap: 12px;
			margin: 20px 0;
			justify-content: center;
			align-items: center;
		}

		select,
		.inspire-btn,
		.reset-btn {
			padding: 12px 16px;
			border: none;
			border-radius: 12px;
			font-size: 1rem;
			cursor: pointer;
			transition: all 0.25s ease;
			background: white;
			color: #333;
		}

		select {
			border: 1px solid #ccc;
			min-width: 260px;
		}

		select:disabled,
		button:disabled {
			opacity: 0.6;
			cursor: wait;
		}

		.inspire-btn {
			background-color: #65105b;
			color: white;
		}

		.inspire-btn:hover {
			background-color: rgb(171,171,171);
			color: #111;
		}

		.reset-btn {
			background-color: #064215;
			color: white;
		}

		.reset-btn:hover {
			background-color: rgb(171,171,171);
			color: #111;
		}

		.content {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 25px;
			max-width: 1200px;
			width: 100%;
			margin: 0 auto;
		}

		@media (max-width: 900px) {
			.content { grid-template-columns: repeat(2, 1fr); }
		}

		@media (max-width: 600px) {
			.content { grid-template-columns: 1fr; }
		}

		.artwork-card,
		.loading-card {
			background: white;
			border-radius: 12px;
			overflow: hidden;
			box-shadow: 0 3px 10px rgba(0,0,0,0.1);
			transition: transform 0.3s ease, box-shadow 0.3s ease;
			outline: none;
		}

		.artwork-card:hover,
		.artwork-card:focus-within {
			transform: translateY(-5px);
			box-shadow: 0 5px 15px rgba(0,0,0,0.2);
		}

		.artwork-card a {
			color: inherit;
			text-decoration: none;
		}

		.artwork-card img,
		.loading-image {
			width: 100%;
			height: 300px;
			object-fit: cover;
			display: block;
			background: linear-gradient(110deg, #e6e6e6, #f8f8f8, #e6e6e6);
		}

		.loading-image {
			display: flex;
			align-items: center;
			justify-content: center;
			color: #777;
			font-size: 0.95rem;
		}

		.artwork-info,
		.loading-info {
			padding: 15px;
		}

		.artwork-info h3 {
			margin: 0 0 8px 0;
			font-size: 1.1rem;
			color: #222;
			font-weight: 600;
		}

		.artwork-info p {
			margin: 0;
			font-size: 0.9rem;
			color: #666;
		}

		.artwork-info .date {
			margin-top: 5px;
			font-size: 0.8rem;
			color: #888;
		}

		.artwork-info .license {
			margin-top: 8px;
			font-size: 0.78rem;
			color: #777;
		}

		.broken-image {
			display: flex;
			align-items: center;
			justify-content: center;
			width: 100%;
			height: 300px;
			background: #ddd;
			color: #555;
			text-align: center;
			padding: 20px;
		}

		.notification {
			position: fixed;
			top: 20px;
			right: 20px;
			max-width: min(420px, calc(100vw - 40px));
			padding: 15px 25px;
			border-radius: 12px;
			color: white;
			display: none;
			animation: slideIn 0.5s ease;
			z-index: 2000;
			line-height: 1.35;
		}

		.loading {
			background-color: rgb(171,171,171);
			color: #111;
		}

		.success { background-color: #65105b; }
		.error { background-color: #dc3545; }

		@keyframes slideIn {
			from { transform: translateX(100%); opacity: 0; }
			to   { transform: translateX(0); opacity: 1; }
		}
	</style>
</head>
<body>
	<div id="animation-page" aria-hidden="true">
		<canvas id="canvas1"></canvas>
	</div>

	<div id="gallery-page">
		<h1>Resonant Art Gallery</h1>

		<div class="button-container">
			<label for="providerSelect" style="position: absolute; left: -9999px">Andmepakkuja</label>
			<select id="providerSelect" aria-label="Data provider">
				<option value="aic">Art Institute of Chicago</option>
				<option value="met">The Met (New York)</option>
			</select>

			<button class="inspire-btn" type="button">Inspire Me</button>
			<button class="reset-btn" type="button">Clear History</button>
		</div>

		<div id="loadingNotification" class="notification loading" role="status" aria-live="polite">Loading the art set…</div>
		<div id="successNotification" class="notification success" role="status" aria-live="polite">Art set loaded!</div>
		<div id="errorNotification" class="notification error" role="alert" aria-live="assertive"></div>

		<div class="content" aria-live="polite"></div>
	</div>

	<script>
		function decodeEntities(str) {
			const txt = document.createElement("textarea");
			txt.innerHTML = String(str ?? "");
			return txt.value;
		}

		function stripTags(str) {
			return String(str ?? "").replace(/<[^>]*>/g, "");
		}

		function normalizeSpaces(str) {
			return String(str ?? "").replace(/\s+/g, " ").trim();
		}

		function cleanText(v) {
			return normalizeSpaces(stripTags(decodeEntities(v)));
		}

		function escapeHTML(v) {
			return String(v ?? "")
				.replace(/&/g, "&amp;")
				.replace(/</g, "&lt;")
				.replace(/>/g, "&gt;")
				.replace(/"/g, "&quot;")
				.replace(/'/g, "&#039;");
		}

		function createAbortError() {
			const err = new Error("Request aborted");
			err.name = "AbortError";
			return err;
		}

		function sleep(ms, signal) {
			return new Promise((resolve, reject) => {
				if (signal?.aborted) return reject(createAbortError());

				const timeoutId = setTimeout(() => {
					cleanup();
					resolve();
				}, ms);

				function onAbort() {
					clearTimeout(timeoutId);
					cleanup();
					reject(createAbortError());
				}

				function cleanup() {
					if (signal) signal.removeEventListener("abort", onAbort);
				}

				if (signal) signal.addEventListener("abort", onAbort, { once: true });
			});
		}

		function shuffle(items) {
			const arr = items.slice();
			for (let i = arr.length - 1; i > 0; i--) {
				const j = Math.floor(Math.random() * (i + 1));
				[arr[i], arr[j]] = [arr[j], arr[i]];
			}
			return arr;
		}

		const canvas = document.getElementById("canvas1");
		const ctx = canvas.getContext("2d");
		canvas.width = window.innerWidth;
		canvas.height = window.innerHeight;

		let gradient = ctx.createRadialGradient(
			canvas.width / 2, canvas.height / 2, 100,
			canvas.width / 2, canvas.height / 2, canvas.width / 2
		);
		gradient.addColorStop(0, "magenta");
		gradient.addColorStop(0.5, "cyan");
		gradient.addColorStop(0.8, "#FF69B4");
		gradient.addColorStop(0.9, "magenta");

		class MatrixSymbol {
			constructor(x, y, fontSize, canvasHeight) {
				this.characters = "♡⚛︎♥︎☻⨂♡♘☂︎☀︎☻☾♘♡☂︎∞⚛︎♠︎♘∏⋈♥︎♛♝♘♚∑⚛︎♓︎♡♊︎♥︎☂︎☻♘★⥣⇓☂︎☻⚛︎♥︎❄︎☆£❀$¥€Ω×1⚛︎2⚛︎3♥︎4☂︎☂︎56♡♥︎78♡9✈︎⚤0⚛︎☻☂︎";
				this.x = x;
				this.y = y;
				this.fontSize = fontSize;
				this.text = "";
				this.canvasHeight = canvasHeight;
			}

			draw(c) {
				this.text = this.characters.charAt(Math.floor(Math.random() * this.characters.length));
				c.fillText(this.text, this.x * this.fontSize, this.y * this.fontSize);
				if (this.y * this.fontSize > this.canvasHeight && Math.random() > 0.98) this.y = 0;
				else this.y += 1;
			}
		}

		class Effect {
			constructor(w, h) {
				this.canvasWidth = w;
				this.canvasHeight = h;
				this.fontSize = 20;
				this.columns = Math.floor(this.canvasWidth / this.fontSize);
				this.symbols = [];
				this.init();
			}

			init() {
				for (let i = 0; i < this.columns; i++) {
					this.symbols[i] = new MatrixSymbol(i, 0, this.fontSize, this.canvasHeight);
				}
			}

			resize(w, h) {
				this.canvasWidth = w;
				this.canvasHeight = h;
				this.columns = Math.floor(this.canvasWidth / this.fontSize);
				this.symbols = [];
				this.init();
			}
		}

		const effect = new Effect(canvas.width, canvas.height);
		let lastTime = 0;
		const fps = 60;
		const nextFrame = 1000 / fps;
		let timer = 0;
		let animationRunning = true;

		function animate(ts) {
			if (!animationRunning) return;

			const dt = ts - lastTime;
			lastTime = ts;

			if (timer > nextFrame) {
				ctx.fillStyle = "rgba(0,0,0,0.05)";
				ctx.textAlign = "center";
				ctx.fillRect(0, 0, canvas.width, canvas.height);
				ctx.fillStyle = gradient;
				ctx.font = effect.fontSize + "px monospace";
				effect.symbols.forEach(s => s.draw(ctx));
				timer = 0;
			} else {
				timer += dt;
			}

			requestAnimationFrame(animate);
		}

		animate(0);

		window.addEventListener("resize", () => {
			canvas.width = window.innerWidth;
			canvas.height = window.innerHeight;
			effect.resize(canvas.width, canvas.height);
			gradient = ctx.createRadialGradient(
				canvas.width / 2, canvas.height / 2, 100,
				canvas.width / 2, canvas.height / 2, canvas.width / 2
			);
			gradient.addColorStop(0, "magenta");
			gradient.addColorStop(0.5, "cyan");
			gradient.addColorStop(0.8, "#FF69B4");
			gradient.addColorStop(0.9, "magenta");
		});

		const loadingNotification = document.getElementById("loadingNotification");
		const successNotification = document.getElementById("successNotification");
		const errorNotification = document.getElementById("errorNotification");
		const contentEl = document.querySelector(".content");
		const providerSelectEl = document.getElementById("providerSelect");
		const inspireBtnEl = document.querySelector(".inspire-btn");
		const resetBtnEl = document.querySelector(".reset-btn");

		const notificationTimers = new WeakMap();

		function hideNotification(el) {
			const timerId = notificationTimers.get(el);
			if (timerId) clearTimeout(timerId);
			notificationTimers.delete(el);
			el.style.display = "none";
		}

		function showNotification(el, duration = 2000) {
			[loadingNotification, successNotification, errorNotification].forEach(hideNotification);
			el.style.display = "block";

			if (duration) {
				const timerId = setTimeout(() => hideNotification(el), duration);
				notificationTimers.set(el, timerId);
			}
		}

		function showError(msg) {
			errorNotification.textContent = msg || "Something went wrong.";
			showNotification(errorNotification, 5000);
			console.error("Error:", msg);
		}

		function setButtonsDisabled(disabled) {
			inspireBtnEl.disabled = disabled;
			providerSelectEl.disabled = disabled;
			resetBtnEl.disabled = disabled;
		}

		function renderLoadingCards() {
			contentEl.innerHTML = "";
			for (let i = 0; i < 6; i++) {
				const card = document.createElement("div");
				card.className = "loading-card";
				card.innerHTML = `
					<div class="loading-image">Loading image…</div>
					<div class="loading-info">
						<p>Connecting to API…</p>
					</div>
				`;
				contentEl.appendChild(card);
			}
		}

		let provider = "aic";
		let activeController = null;
		let seenIds = new Set();

		const AIC_SEARCH_URL = "https://api.artic.edu/api/v1/artworks/search";
		const AIC_FIELDS = ["id", "title", "image_id", "artist_display", "date_display", "medium_display", "description"];
		const SEARCH_TERMS = [
			"painting", "portrait", "landscape", "flower", "woman", "man", "animal", "vase",
			"sculpture", "drawing", "textile", "abstract", "nature", "water", "still life", "city"
		];

		function loadSeen() {
			try {
				seenIds = new Set(JSON.parse(localStorage.getItem("seen-artworks") || "[]"));
			} catch {
				seenIds = new Set();
			}
		}

		function saveSeen() {
			try {
				localStorage.setItem("seen-artworks", JSON.stringify([...seenIds]));
			} catch {}
		}

		async function fetchWithTimeout(url, { signal, timeoutMs = 10000, ...options } = {}) {
			if (signal?.aborted) throw createAbortError();

			const controller = new AbortController();
			const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

			function onAbort() {
				controller.abort();
			}

			if (signal) signal.addEventListener("abort", onAbort, { once: true });

			try {
				const response = await fetch(url, {
					...options,
					signal: controller.signal
				});
				return response;
			} finally {
				clearTimeout(timeoutId);
				if (signal) signal.removeEventListener("abort", onAbort);
			}
		}

		async function fetchJSON(url, options = {}) {
			const response = await fetchWithTimeout(url, options);
			if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
			return response.json();
		}

		function mapAICArtwork(item) {
			if (!item?.image_id) return null;

			return {
				id: `aic_${item.id}`,
				title: cleanText(item.title || "Untitled"),
				imageUrl: `https://www.artic.edu/iiif/2/${item.image_id}/full/512,/0/default.jpg`,
				imageUrlLarge: `https://www.artic.edu/iiif/2/${item.image_id}/full/1200,/0/default.jpg`,
				artist: cleanText(item.artist_display || "Artist Unknown"),
				date: cleanText(item.date_display || ""),
				medium: cleanText(item.medium_display || ""),
				description: cleanText(item.description || ""),
				license: "Art Institute of Chicago"
			};
		}

		async function fetchAICBatch(signal) {
	const results = [];

	for (let attempt = 0; attempt < 5 && results.length < 24; attempt++) {
		try {
			const page = Math.floor(Math.random() * 250) + 1;

			const params = new URLSearchParams();
			params.set("page", String(page));
			params.set("limit", "100");
			params.set("fields", AIC_FIELDS.join(","));

			const url = `https://api.artic.edu/api/v1/artworks?${params.toString()}`;
			const data = await fetchJSON(url, { signal, timeoutMs: 10000 });

			const mapped = (data.data || [])
				.map(mapAICArtwork)
				.filter(Boolean);

			results.push(...mapped);
		} catch (error) {
			if (error.name === "AbortError") throw error;
			console.warn("AIC artworks request failed:", error);
		}
	}

	const byId = new Map();
	for (const item of results) {
		if (item?.id && item?.imageUrl && !byId.has(item.id)) {
			byId.set(item.id, item);
		}
	}

	return shuffle(Array.from(byId.values()));
}
		async function fetchMetBatch(signal) {
			const term = SEARCH_TERMS[Math.floor(Math.random() * SEARCH_TERMS.length)];
			const searchUrl = `https://collectionapi.metmuseum.org/public/collection/v1/search?hasImages=true&q=${encodeURIComponent(term)}`;
			const searchData = await fetchJSON(searchUrl, { signal, timeoutMs: 10000 });
			const ids = shuffle(searchData.objectIDs || []).slice(0, 80);
			const results = [];
			let index = 0;
			const concurrency = 5;

			async function worker() {
				while (!signal.aborted && results.length < 24 && index < ids.length) {
					const id = ids[index++];

					for (let attempt = 0; attempt < 3; attempt++) {
						try {
							const response = await fetchWithTimeout(
								`https://collectionapi.metmuseum.org/public/collection/v1/objects/${id}`,
								{ signal, timeoutMs: 8000 }
							);

							if (response.status === 429 || response.status === 403) {
								await sleep(500 + attempt * 700, signal);
								continue;
							}

							if (!response.ok) break;

							const obj = await response.json();
							const small = obj.primaryImageSmall || obj.primaryImage;
							const large = obj.primaryImage || obj.primaryImageSmall;

							if (small || large) {
								results.push({
									id: `met_${obj.objectID}`,
									title: cleanText(obj.title || "Untitled"),
									imageUrl: small || large,
									imageUrlLarge: large || small,
									artist: cleanText(obj.artistDisplayName || "Artist Unknown"),
									date: cleanText(obj.objectDate || ""),
									medium: cleanText(obj.medium || ""),
									description: cleanText(obj.creditLine || ""),
									license: "The Met Open Access"
								});
							}

							break;
						} catch (error) {
							if (error.name === "AbortError") throw error;
							await sleep(300 + attempt * 400, signal).catch(() => {});
						}
					}
				}
			}

			await Promise.all(Array.from({ length: concurrency }, () => worker()));
			return results;
		}

		function preloadImage(url, timeoutMs = 4500) {
			return new Promise(resolve => {
				if (!url) return resolve(false);

				const img = new Image();
				let done = false;
				const timeoutId = setTimeout(() => finish(false), timeoutMs);

				function finish(ok) {
					if (done) return;
					done = true;
					clearTimeout(timeoutId);
					img.onload = null;
					img.onerror = null;
					resolve(ok);
				}

				img.onload = () => finish(true);
				img.onerror = () => finish(false);
				img.src = url;
			});
		}

		async function fetchArtworksForCurrentProvider(signal) {
			const all = [];

			for (let attempt = 0; attempt < 4 && all.length < 12; attempt++) {
				const batch = provider === "met"
					? await fetchMetBatch(signal)
					: await fetchAICBatch(signal);

				all.push(...batch);
			}

			const byId = new Map();
			for (const item of all) {
				if (item?.id && item?.imageUrl && !byId.has(item.id)) byId.set(item.id, item);
			}

			return shuffle(Array.from(byId.values()));
		}

		async function chooseSixRenderable(candidates) {
			let usable = candidates.filter(item => !seenIds.has(item.id));
			if (usable.length < 6) usable = candidates;

			const firstGroup = usable.slice(0, 18);
			const checks = await Promise.all(firstGroup.map(async artwork => ({
				artwork,
				ok: await preloadImage(artwork.imageUrl)
			})));

			const loaded = checks.filter(item => item.ok).map(item => item.artwork);
			if (loaded.length >= 6) return loaded.slice(0, 6);

			return usable.slice(0, 6);
		}

		function makeDetailPageUrl(artwork, fullImageUrl) {
			const title = cleanText(artwork.title || "Untitled");
			const artist = cleanText(artwork.artist || "Artist Unknown");
			const date = cleanText(artwork.date || "");
			const medium = cleanText(artwork.medium || "");
			const desc = cleanText(artwork.description || "");
			const license = cleanText(artwork.license || "");

			const safeTitle = escapeHTML(title);
			const safeArtist = escapeHTML(artist);
			const safeDate = escapeHTML(date);
			const safeMedium = escapeHTML(medium);
			const safeDesc = escapeHTML(desc);
			const safeLicense = escapeHTML(license);
			const safeImageUrl = escapeHTML(fullImageUrl);

			const html = `<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>${safeTitle}</title>
<style>
:root { --text:#333; --muted:#888; --bg:#f5f5f5; }
body { font-family:"Franklin Gothic Medium","Arial Narrow",Arial,sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; }
.wrap { max-width:1100px; margin:0 auto; }
img { max-width:100%; height:auto; display:block; border-radius:8px; margin-bottom:16px; }
.caption { padding: 15px 0 0 0; }
.caption-title { margin:0 0 8px 0; font-size:1.1rem; font-weight:400; color:#222; }
.caption-line { margin:0; font-size:0.9rem; color:#666; }
.caption-date { margin-top:5px; font-size:0.8rem; color:var(--muted); }
.desc { margin-top:12px; font-size:0.95rem; line-height:1.45; white-space:pre-wrap; color:#333; }

		function makeCard(artwork) {
			const card = document.createElement("article");
			card.className = "artwork-card";

			const img = new Image();
			img.loading = "eager";
			img.decoding = "async";
			img.alt = artwork.title || "Artwork image";
			img.src = artwork.imageUrl;

			img.addEventListener("error", () => {
				const fallback = document.createElement("div");
				fallback.className = "broken-image";
				fallback.textContent = "Image could not be loaded";
				img.replaceWith(fallback);
			}, { once: true });

			const detailUrl = makeDetailPageUrl(artwork, artwork.imageUrlLarge || artwork.imageUrl);

			const link = document.createElement("a");
			link.href = detailUrl;
			link.target = "_blank";
			link.rel = "noopener noreferrer";
			link.appendChild(img);

			const info = document.createElement("div");
			info.className = "artwork-info";

			const h3 = document.createElement("h3");
			h3.textContent = artwork.title || "Untitled";

			const pArtist = document.createElement("p");
			pArtist.textContent = artwork.artist || "Artist Unknown";

			const pDate = document.createElement("p");
			pDate.className = "date";
			pDate.textContent = artwork.date || "";

			const pLicense = document.createElement("p");
			pLicense.className = "license";
			pLicense.textContent = artwork.license || "";

			info.appendChild(h3);
			info.appendChild(pArtist);
			info.appendChild(pDate);
			info.appendChild(pLicense);

			card.appendChild(link);
			card.appendChild(info);
			return card;
		}

		function renderGallery(items) {
			contentEl.innerHTML = "";
			items.forEach(item => contentEl.appendChild(makeCard(item)));
		}

		async function showSixNew() {
			if (activeController) activeController.abort();
			activeController = new AbortController();
			const signal = activeController.signal;

			setButtonsDisabled(true);
			showNotification(loadingNotification, 0);
			renderLoadingCards();

			try {
				const candidates = await fetchArtworksForCurrentProvider(signal);
				const nextSix = await chooseSixRenderable(candidates);

				if (!nextSix.length) {
					contentEl.innerHTML = "";
					showError("No images found. Try again or choose the other API.");
					return;
				}

				nextSix.forEach(item => seenIds.add(item.id));
				saveSeen();
				renderGallery(nextSix);
				showNotification(successNotification, 1200);
			} catch (error) {
				if (error.name !== "AbortError") {
					contentEl.innerHTML = "";
					console.error(error);
					showError("Images could not be loaded. Try again or choose the other API.");
				}
			} finally {
				if (!signal.aborted) {
					hideNotification(loadingNotification);
					setButtonsDisabled(false);
				}
			}
		}

		function resetHistory() {
			seenIds.clear();
			saveSeen();
			showSixNew();
		}

		providerSelectEl.addEventListener("change", (event) => {
			provider = event.target.value;
			showSixNew();
		});

		inspireBtnEl.addEventListener("click", showSixNew);
		resetBtnEl.addEventListener("click", resetHistory);

		loadSeen();

		setTimeout(() => {
			const animationPage = document.getElementById("animation-page");
			const galleryPage = document.getElementById("gallery-page");

			animationPage.classList.add("fade-out");

			setTimeout(() => {
				animationRunning = false;
				ctx.clearRect(0, 0, canvas.width, canvas.height);
				animationPage.style.display = "none";
				galleryPage.style.display = "block";
				showSixNew();
			}, 1000);
		}, 3500);
	</script>
