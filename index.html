<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resonant Art Gallery</title>

  <link rel="preconnect" href="https://api.artic.edu" crossorigin>
  <link rel="preconnect" href="https://www.artic.edu" crossorigin>
  <link rel="preconnect" href="https://collectionapi.metmuseum.org" crossorigin>
  <link rel="preconnect" href="https://images.metmuseum.org" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Foldit:wght@400&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    header {
      padding: 28px 20px 10px;
      text-align: center;
    }

    h1 {
      font-family: "Foldit", sans-serif;
      font-weight: 400;
      color: #333;
      font-size: clamp(2.4rem, 7vw, 4.2rem);
      margin-bottom: 18px;
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: center;
      margin-bottom: 18px;
    }

    select,
    button {
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      background: white;
      color: #333;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    select { border: 1px solid #ccc; min-width: 260px; }

    .inspire-btn { background-color: #65105b; color: white; }
    .reset-btn { background-color: #064215; color: white; }
    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: 0.6; cursor: wait; }

    .status {
      min-height: 28px;
      text-align: center;
      margin: 10px auto 18px;
      color: #65105b;
      font-size: 1rem;
    }

    .status.error { color: #c62828; }

    .content {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
      width: min(1200px, calc(100% - 40px));
      margin: 0 auto 40px;
    }

    @media (max-width: 900px) {
      .content { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .content { grid-template-columns: 1fr; }
    }

    .artwork-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .artwork-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .artwork-card a {
      color: inherit;
      text-decoration: none;
    }

    .artwork-card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      display: block;
      background: #ddd;
    }

    .artwork-info { padding: 15px; }
    .artwork-info h3 { margin-bottom: 8px; font-size: 1.08rem; color: #222; }
    .artwork-info p { margin: 0; font-size: 0.9rem; color: #666; }
    .artwork-info .date { margin-top: 5px; font-size: 0.8rem; color: #888; }
    .artwork-info .license { margin-top: 8px; font-size: 0.78rem; color: #777; }
  </style>
</head>
<body>
  <header>
    <h1>Resonant Art Gallery</h1>

    <div class="button-container">
      <label for="providerSelect" style="position:absolute;left:-9999px;">Andmepakkuja</label>
      <select id="providerSelect" aria-label="Data provider">
        <option value="aic">Art Institute of Chicago</option>
        <option value="met">The Met (New York)</option>
      </select>

      <button class="inspire-btn" type="button">Inspire Me</button>
      <button class="reset-btn" type="button">Clear History</button>
    </div>

    <div id="status" class="status" role="status" aria-live="polite"></div>
  </header>

  <main>
    <div class="content" aria-live="polite"></div>
  </main>

  <script>
    const contentEl = document.querySelector(".content");
    const statusEl = document.getElementById("status");
    const providerSelectEl = document.getElementById("providerSelect");
    const inspireBtnEl = document.querySelector(".inspire-btn");
    const resetBtnEl = document.querySelector(".reset-btn");

    let provider = "aic";
    let loadingController = null;
    let seenIds = new Set();

    const AIC_SEARCH_URL = "https://api.artic.edu/api/v1/artworks/search";
    const AIC_IMAGE_BASE = "https://www.artic.edu/iiif/2/";
    const MET_SEARCH_TERMS = [
      "painting", "portrait", "landscape", "flower", "woman", "man",
      "sculpture", "vase", "textile", "drawing", "animal", "abstract"
    ];

    function cleanText(value) {
      const div = document.createElement("div");
      div.innerHTML = String(value ?? "");
      return div.textContent.replace(/\s+/g, " ").trim();
    }

    function loadSeen() {
      try {
        seenIds = new Set(JSON.parse(localStorage.getItem("seen-artworks") || "[]"));
      } catch {
        seenIds = new Set();
      }
    }

    function saveSeen() {
      try {
        localStorage.setItem("seen-artworks", JSON.stringify([...seenIds]));
      } catch {}
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function setLoading(isLoading) {
      inspireBtnEl.disabled = isLoading;
      providerSelectEl.disabled = isLoading;
      resetBtnEl.disabled = isLoading;
    }

    function delay(ms, signal) {
      return new Promise((resolve, reject) => {
        if (signal?.aborted) return reject(new DOMException("Aborted", "AbortError"));
        const id = setTimeout(resolve, ms);
        signal?.addEventListener("abort", () => {
          clearTimeout(id);
          reject(new DOMException("Aborted", "AbortError"));
        }, { once: true });
      });
    }

    async function fetchJSON(url, options = {}, timeoutMs = 10000) {
      const timeoutController = new AbortController();
      const externalSignal = options.signal;
      const timeoutId = setTimeout(() => timeoutController.abort(), timeoutMs);

      function abortFromExternal() {
        timeoutController.abort();
      }

      if (externalSignal) {
        if (externalSignal.aborted) timeoutController.abort();
        else externalSignal.addEventListener("abort", abortFromExternal, { once: true });
      }

      try {
        const response = await fetch(url, { ...options, signal: timeoutController.signal });
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        return await response.json();
      } finally {
        clearTimeout(timeoutId);
        if (externalSignal) externalSignal.removeEventListener("abort", abortFromExternal);
      }
    }

    function shuffle(items) {
      const arr = items.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function preloadImage(url, timeoutMs = 7000) {
      return new Promise(resolve => {
        if (!url) return resolve(false);

        const img = new Image();
        let finished = false;
        const timeoutId = setTimeout(() => finish(false), timeoutMs);

        function finish(ok) {
          if (finished) return;
          finished = true;
          clearTimeout(timeoutId);
          img.onload = null;
          img.onerror = null;
          resolve(ok);
        }

        img.onload = () => finish(true);
        img.onerror = () => finish(false);
        img.src = url;
      });
    }

    async function fetchAICBatch(signal) {
      const probeBody = {
        limit: 1,
        query: {
          bool: {
            must: [
              { term: { is_public_domain: true } },
              { exists: { field: "image_id" } }
            ]
          }
        }
      };

      const probe = await fetchJSON(AIC_SEARCH_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(probeBody),
        signal
      }, 10000);

      const total = Number(probe?.pagination?.total) || 5000;
      const limit = 60;
      const maxOffset = Math.max(0, total - limit);
      const offset = Math.floor(Math.random() * (maxOffset + 1));

      const data = await fetchJSON(AIC_SEARCH_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          limit,
          offset,
          fields: ["id", "title", "image_id", "artist_display", "date_display", "medium_display", "description"],
          query: probeBody.query
        }),
        signal
      }, 10000);

      return (data.data || [])
        .filter(item => item.image_id)
        .map(item => ({
          id: `aic_${item.id}`,
          title: cleanText(item.title || "Untitled"),
          artist: cleanText(item.artist_display || "Artist Unknown"),
          date: cleanText(item.date_display || ""),
          medium: cleanText(item.medium_display || ""),
          description: cleanText(item.description || ""),
          imageUrl: `${AIC_IMAGE_BASE}${item.image_id}/full/843,/0/default.jpg`,
          imageUrlLarge: `${AIC_IMAGE_BASE}${item.image_id}/full/1200,/0/default.jpg`,
          license: "Public Domain"
        }));
    }

    async function fetchMetBatch(signal) {
      const term = MET_SEARCH_TERMS[Math.floor(Math.random() * MET_SEARCH_TERMS.length)];
      const searchUrl = `https://collectionapi.metmuseum.org/public/collection/v1/search?hasImages=true&q=${encodeURIComponent(term)}`;
      const searchData = await fetchJSON(searchUrl, { signal }, 10000);
      const ids = shuffle(searchData.objectIDs || []).slice(0, 80);
      const results = [];
      let index = 0;
      const concurrency = 4;

      async function worker() {
        while (!signal.aborted && results.length < 24 && index < ids.length) {
          const id = ids[index++];

          for (let attempt = 0; attempt < 3; attempt++) {
            try {
              const obj = await fetchJSON(
                `https://collectionapi.metmuseum.org/public/collection/v1/objects/${id}`,
                { signal },
                8000
              );

              const small = obj.primaryImageSmall || obj.primaryImage;
              const large = obj.primaryImage || obj.primaryImageSmall;

              if (small || large) {
                results.push({
                  id: `met_${obj.objectID}`,
                  title: cleanText(obj.title || "Untitled"),
                  artist: cleanText(obj.artistDisplayName || "Artist Unknown"),
                  date: cleanText(obj.objectDate || ""),
                  medium: cleanText(obj.medium || ""),
                  description: cleanText(obj.creditLine || ""),
                  imageUrl: small || large,
                  imageUrlLarge: large || small,
                  license: "Open Access"
                });
              }

              break;
            } catch (error) {
              if (error.name === "AbortError") throw error;
              await delay(400 + attempt * 600, signal);
            }
          }
        }
      }

      await Promise.all(Array.from({ length: concurrency }, worker));
      return results;
    }

    async function getRenderableArtworks(count, signal) {
      const renderable = [];
      let attempts = 0;

      while (renderable.length < count && attempts < 4) {
        attempts++;
        const batch = provider === "met"
          ? await fetchMetBatch(signal)
          : await fetchAICBatch(signal);

        const candidates = batch.filter(item => !seenIds.has(item.id));

        for (const artwork of candidates) {
          if (renderable.length >= count) break;
          const ok = await preloadImage(artwork.imageUrl);
          if (ok) renderable.push(artwork);
        }
      }

      return renderable;
    }

    function makeCard(artwork) {
      const card = document.createElement("article");
      card.className = "artwork-card";

      const link = document.createElement("a");
      link.href = artwork.imageUrlLarge || artwork.imageUrl;
      link.target = "_blank";
      link.rel = "noopener noreferrer";

      const img = new Image();
      img.loading = "eager";
      img.decoding = "async";
      img.alt = artwork.title;
      img.src = artwork.imageUrl;

      link.appendChild(img);

      const info = document.createElement("div");
      info.className = "artwork-info";

      const title = document.createElement("h3");
      title.textContent = artwork.title;

      const artist = document.createElement("p");
      artist.textContent = artwork.artist;

      const date = document.createElement("p");
      date.className = "date";
      date.textContent = artwork.date;

      const license = document.createElement("p");
      license.className = "license";
      license.textContent = artwork.license;

      info.append(title, artist, date, license);
      card.append(link, info);
      return card;
    }

    function renderGallery(items) {
      contentEl.innerHTML = "";
      items.forEach(item => contentEl.appendChild(makeCard(item)));
    }

    async function showNewGallery() {
      if (loadingController) loadingController.abort();
      loadingController = new AbortController();
      const signal = loadingController.signal;

      setLoading(true);
      setStatus(provider === "met" ? "Loading images from The Met…" : "Loading images from Art Institute of Chicago…");

      try {
        const artworks = await getRenderableArtworks(6, signal);

        if (!artworks.length) {
          setStatus("Pilte ei õnnestunud laadida. Proovi uuesti või vali teine API.", true);
          return;
        }

        artworks.forEach(item => seenIds.add(item.id));
        saveSeen();
        renderGallery(artworks);
        setStatus(`Loaded ${artworks.length} images.`);
      } catch (error) {
        if (error.name !== "AbortError") {
          console.error(error);
          setStatus("API ühendus ebaõnnestus. Ava Console, kui soovid veateadet näha.", true);
        }
      } finally {
        if (!signal.aborted) setLoading(false);
      }
    }

    providerSelectEl.addEventListener("change", event => {
      provider = event.target.value;
      showNewGallery();
    });

    inspireBtnEl.addEventListener("click", showNewGallery);

    resetBtnEl.addEventListener("click", () => {
      seenIds.clear();
      saveSeen();
      showNewGallery();
    });

    loadSeen();
    showNewGallery();
  </script>
</body>
</html>
